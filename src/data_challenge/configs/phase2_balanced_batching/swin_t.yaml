project_name: data-challenge-occlusion
run_name: phase2_balanced_swin_t

data:
  train_csv: dataset/DataChallenge2026/occlusion_datasets/train.csv
  test_csv: dataset/DataChallenge2026/occlusion_datasets/test_students.csv
  img_root: dataset/crops/Crop_224_5fp_100K
  val_split: 0.1
  img_size: 224
  num_workers: 4

model:
  backbone: swin_t
  pretrained: true
  dropout: 0.3

training:
  epochs: 20
  batch_size: 32
  learning_rate: 5.0e-5
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 3
  seed: 42
  gradient_clip: 1.0
  batching:
    strategy: balanced_gender
    drop_last: false

wandb:
  enabled: true
  project: data-challenge-occlusion
  entity: null

output:
  dir: outputs
