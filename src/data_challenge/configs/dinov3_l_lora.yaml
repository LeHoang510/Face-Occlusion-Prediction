project_name: data-challenge-occlusion
run_name: dinov3_l_lora

data:
  train_csv: dataset/DataChallenge2026/occlusion_datasets/train.csv
  test_csv: dataset/DataChallenge2026/occlusion_datasets/test_students.csv
  img_root: dataset/crops/Crop_224_5fp_100K
  val_split: 0.1
  img_size: 224
  num_workers: 8

model:
  name: dinov3
  model_id: facebook/dinov3-vitl16-pretrain-lvd1689m   # may require HF_TOKEN (gated)
  freeze_backbone: true
  trust_remote_code: true
  head_dropout: 0.1
  hidden_dim: 512
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["query", "value"]   # adjust if AutoModel uses q_proj/v_proj etc.
    bias: none

training:
  epochs: 15
  batch_size: 64           # ViT-L embeddings are heavy; tune to your GPU memory
  learning_rate: 5.0e-4    # LoRA tolerates higher LR than full fine-tuning
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 1
  seed: 42
  gradient_clip: 1.0

wandb:
  enabled: true
  project: data-challenge-occlusion
  entity: null

output:
  dir: outputs
