project_name: data-challenge-occlusion
run_name: dinov2_base

data:
  train_csv: dataset/DataChallenge2026/occlusion_datasets/train.csv
  test_csv: dataset/DataChallenge2026/occlusion_datasets/test_students.csv
  img_root: dataset/crops/Crop_224_5fp_100K
  val_split: 0.1
  img_size: 224
  num_workers: 4

model:
  backbone: vit_base_patch14_dinov2.lvd142m
  pretrained: true
  dropout: 0.2

training:
  epochs: 20
  batch_size: 16  # use 8 if OOM
  learning_rate: 2.0e-5  # base is larger, needs smaller lr
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 4
  seed: 42
  gradient_clip: 1.0

wandb:
  enabled: true
  project: data-challenge-occlusion
  entity: null

output:
  dir: outputs
